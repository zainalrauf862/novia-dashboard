name: Update Novia Dashboard

on:
  schedule:
    - cron: '*/10 * * * *'   # otomatis tiap 10 menit (best-effort GitHub)
  workflow_dispatch:          # tombol "Run workflow" buat update instan

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Tarik data Meta & bangun dashboard
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          TZ: Asia/Jakarta
        run: |
          python pull_novia.py
          cp novia-dashboard.html index.html

      - name: Commit hasil
        run: |
          git config user.name "novia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "auto update dashboard" || echo "tidak ada perubahan"
          git push
